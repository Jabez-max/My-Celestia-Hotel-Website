<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Celestia Hotel</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(26, 35, 50, 0.8), rgba(26, 35, 50, 0.9)), url('https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg') center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-login-box {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid #b88b4a; 
        }

        .admin-logo {
            font-family: 'Times New Roman', serif;
            font-size: 2rem;
            color: #1a2332;
            margin: 0;
            letter-spacing: 3px;
        }

        .admin-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a2332;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #b88b4a;
        }

        #error-msg {
            color: #a10022;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
        }

        .btn-admin {
            width: 100%;
            padding: 15px;
            background-color: #1a2332;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-admin:hover {
            background-color: #b88b4a;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #1a2332;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="admin-login-box">
        <h1 class="admin-logo">CELESTIA</h1>
        <p class="admin-subtitle">Secure Admin Portal</p>

        <p id="error-msg">Invalid username or password.</p>

        <form id="admin-login-form">
            <div class="input-group">
                <label for="admin-user">Username</label>
                <input type="text" id="admin-user" placeholder="Enter admin username" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="admin-pass">Password</label>
                <input type="password" id="admin-pass" placeholder="Enter admin password" required>
            </div>

            <button type="submit" class="btn-admin">SECURE LOGIN</button>
        </form>

        <a href="index.html" class="back-link">← Return to Public Website</a>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            const errorMsg = document.getElementById('error-msg');

            if (user === 'admin' && pass === 'admin123') {
                errorMsg.style.display = 'none';
                
                
                sessionStorage.setItem('celestia_admin_logged_in', 'true');
                
                const btn = document.querySelector('.btn-admin');
                btn.innerText = 'AUTHENTICATING...';
                btn.style.backgroundColor = '#b88b4a';

                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);

            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
